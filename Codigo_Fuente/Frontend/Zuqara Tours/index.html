<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuqara Tours | Iniciar Sesión</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="contenedor-principal">

        <div class="tarjeta-login">

            <!-- Lado izquierdo -->
            <div class="panel-login">

                <img src="img/logo.png" alt="Logo" class="logo-proyecto">

                <h2 class="titulo-login">
                    Iniciar Sesión
                </h2>

                <p class="subtitulo-login">
                    Bienvenido a Zuqara Tours
                </p>

                <form action="principal.html">

                    <div class="mb-3">
                        <label class="form-label">
                            Correo electrónico
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            placeholder="correo@ejemplo.com"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            placeholder="********"
                            required>
                    </div>

                    <button
                        type="submit"
                        class="btn boton-login w-100">

                        Ingresar

                    </button>

                </form>

                <div class="mt-4 text-center">

                    <p>
                        ¿No tienes cuenta?

                        <a href="registro.html">
                            Regístrate
                        </a>
                    </p>

                    <p>
                        ¿Eres una empresa?

                        <a href="login_empresa.html">
                            Iniciar sesión como empresa
                        </a>
                    </p>

                </div>

            </div>

            <!-- Lado derecho -->
            <div class="panel-imagen">

                <img
                    src="img/turismo.jpg"
                    alt="Turismo"
                    class="imagen-fondo">

                <div class="recuadro-info">

                    <img
                        src="img/logo.png"
                        alt="Logo"
                        class="logo-recuadro">

                    <h3>
                        Explora nuevos destinos
                    </h3>

                    <p>
                        Encuentra experiencias únicas y reserva los mejores tours
                        para tus próximas aventuras.
                    </p>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
