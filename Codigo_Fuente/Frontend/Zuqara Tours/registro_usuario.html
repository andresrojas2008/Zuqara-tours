<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/registro_usuario.css">
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="caja-registro">

        <img src="img/logo.png" class="logo-proyecto" alt="Logo">

        <h2 class="titulo">
            Crear Usuario
        </h2>

        <form>

            <input type="text" class="form-control mb-3" placeholder="Nombre completo">

            <input type="email" class="form-control mb-3" placeholder="Correo electrónico">

            <input type="text" class="form-control mb-3" placeholder="Número de teléfono">

            <input type="password" class="form-control mb-3" placeholder="Contraseña">

            <input type="password" class="form-control mb-4" placeholder="Confirmar contraseña">

            <button class="btn boton-registrar w-100">
                Crear Usuario
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="registro.html">← Volver</a>
        </div>

    </div>

</div>

</body>

</html>
