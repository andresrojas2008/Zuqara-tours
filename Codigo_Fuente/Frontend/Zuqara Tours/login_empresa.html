<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Empresa</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login_empresa.css">
</head>

<body>

<div class="contenedor-principal">

    <div class="tarjeta-login">

        <!-- Panel izquierdo -->
        <div class="panel-login">

            <img src="img/logo.png" alt="Logo" class="logo-proyecto">

            <h2 class="titulo-login">
                Acceso para Empresas
            </h2>

            <p class="subtitulo-login">
                Ingresa para administrar tus tours y reservas.
            </p>

            <form>

                <div class="mb-3">
                    <label class="form-label">Correo empresarial</label>
                    <input type="email" class="form-control" placeholder="empresa@correo.com">
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" placeholder="********">
                </div>

                <button type="submit" class="btn boton-login w-100">
                    Ingresar
                </button>

            </form>

            <p class="texto-inferior mt-4">
                ¿Aún no registras tu empresa?
                <a href="registro_empresa.html">Crear empresa</a>
            </p>

        </div>

        <!-- Panel derecho -->
        <div class="panel-imagen">

            <img src="img/empresa.jpg" alt="Empresa turística" class="imagen-login">

            <div class="recuadro-texto">
                <img src="img/logo.png" alt="Logo" class="logo-recuadro">

                <h3>Gestiona tu negocio</h3>

                <p>
                    Publica tus tours, controla las reservas y llega a más viajeros desde un solo lugar.
                </p>
            </div>

        </div>

    </div>

</div>

</body>

</html>
